document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

splay: swap;\n  src: url(\"a3cac76e-7268-4c08-baa5-c61a2e632986\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"823d6ab9-399b-4e06-8356-a7b88f68efd2\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0d7895ce-0a93-49d0-8ec0-8ee489e577c3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"25bec15d-66c6-4e64-b28f-fc8389fababf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;}\n  ::selection{background:#c5b0f5;color:#0b0b11;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ rootRef }}\" style=\"background:var(--bg,#0b0b11);color:var(--fg,#e9e9f2);min-height:100vh;font-family:'Space Mono',monospace;position:relative;overflow-x:hidden;\">\n\n  <!-- CRT scanlines -->\n  <sc-if value=\"{{ scanlines }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:fixed;inset:0;background:repeating-linear-gradient(0deg,var(--scan,rgba(255,255,255,0.025)) 0,var(--scan,rgba(255,255,255,0.025)) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- NAV -->\n  <div style=\"position:sticky;top:0;z-index:30;background:var(--bg,#0b0b11);border-bottom:1px solid var(--line,#23232f);\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n      <div onclick=\"{{ goHome }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:15px;color:var(--purple,#c5b0f5);cursor:pointer;letter-spacing:0.02em;\">SOMNARADEV<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:22px;\">\n        <div onclick=\"{{ goHome }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;cursor:pointer;color:{{ navHome }};\">HOME<\u002Fdiv>\n        <div onclick=\"{{ goGames }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;cursor:pointer;color:{{ navGames }};\">GAMES<\u002Fdiv>\n        <div onclick=\"{{ goDevlog }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;cursor:pointer;color:{{ navDevlog }};\">DEVLOG<\u002Fdiv>\n        <a href=\"https://instagram.com/SomnaraDev\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;text-decoration:none;color:var(--muted,#8a8a9a);\">INSTA<\u002Fa>\n        <div onclick=\"{{ toggleTheme }}\" title=\"Toggle theme\" style=\"font-family:'Silkscreen',sans-serif;font-size:9px;cursor:pointer;color:var(--bg,#0b0b11);background:var(--purple,#c5b0f5);padding:7px 10px;border:1px solid var(--purple,#c5b0f5);\">{{ themeLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1080px;margin:0 auto;padding:0 24px;\">\n\n    <!-- ============ HOME ============ -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <!-- hero -->\n      <div style=\"padding:84px 0 64px;border-bottom:1px solid var(--line,#23232f);\">\n        <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--magenta,#ff5ea8);letter-spacing:0.14em;margin-bottom:22px;\">◆ SOLO GAME DEVELOPER · NEW ZEALAND<\u002Fdiv>\n        <h1 style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:74px;line-height:0.94;margin:0 0 26px;letter-spacing:0.01em;\">I MAKE<br>WEIRD LITTLE<br><span style=\"color:var(--purple,#c5b0f5);\">GAMES.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:15px;line-height:1.7;color:var(--muted,#8a8a9a);margin:0 0 32px;max-width:540px;\">Story games, roguelites and idle games - little worlds I can hide away in and build, one pixel at a time. Just me, my friend who tests everything, and a notebook full of ideas, as <span style=\"color:var(--fg,#e9e9f2);\">SomnaraDev<\u002Fspan>.<\u002Fp>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n          <div onclick=\"{{ goGames }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:11px;cursor:pointer;color:var(--bg,#0b0b11);background:var(--purple,#c5b0f5);padding:14px 20px;border:1px solid var(--purple,#c5b0f5);\" style-hover=\"background:transparent;color:var(--purple,#c5b0f5);\">EXPLORE THE GAMES →<\u002Fdiv>\n          <a href=\"https://instagram.com/SomnaraDev\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Silkscreen',sans-serif;font-size:11px;text-decoration:none;color:var(--fg,#e9e9f2);padding:14px 20px;border:1px solid var(--line,#23232f);\" style-hover=\"border-color:var(--purple,#c5b0f5);\">@SOMNARADEV<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- featured -->\n      <div style=\"padding:56px 0;\">\n        <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--muted,#8a8a9a);letter-spacing:0.1em;margin-bottom:22px;\">★ NOW IN FOCUS<\u002Fdiv>\n        <div onclick=\"{{ featured.open }}\" style=\"cursor:pointer;display:grid;grid-template-columns:1.3fr 1fr;gap:0;border:1px solid var(--line,#23232f);background:var(--bg2,#101019);\" style-hover=\"border-color:var(--purple,#c5b0f5);\">\n          <div style=\"aspect-ratio:16/10;background:repeating-linear-gradient(45deg,var(--bg3,#16161f),var(--bg3,#16161f) 11px,var(--bg2,#101019) 11px,var(--bg2,#101019) 22px);display:flex;align-items:center;justify-content:center;\">\n            {{ featured.artEl }}\n          <\u002Fdiv>\n          <div style=\"padding:34px 30px;display:flex;flex-direction:column;justify-content:center;\">\n            <div style=\"display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ featured.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                <span style=\"font-family:'Silkscreen',sans-serif;font-size:8px;color:var(--purple,#c5b0f5);border:1px solid var(--line,#23232f);padding:5px 8px;\">{{ tag }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:38px;line-height:1;margin-bottom:14px;\">{{ featured.title }}<\u002Fdiv>\n            <p style=\"font-size:13px;line-height:1.65;color:var(--muted,#8a8a9a);margin:0 0 20px;\">{{ featured.blurb }}<\u002Fp>\n            <div style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--green,#5ef38c);\">VIEW PROJECT &amp; DEVLOG →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- all games grid -->\n      <div style=\"padding:8px 0 56px;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;\">\n          <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--muted,#8a8a9a);letter-spacing:0.1em;\">⊞ MORE GAMES<\u002Fdiv>\n          <div onclick=\"{{ goGames }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--purple,#c5b0f5);cursor:pointer;\">SEE ALL →<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n          <sc-for list=\"{{ others }}\" as=\"game\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ game.open }}\" style=\"cursor:pointer;border:1px solid var(--line,#23232f);background:var(--bg2,#101019);\" style-hover=\"border-color:var(--purple,#c5b0f5);transform:translateY(-3px);\">\n              <div style=\"aspect-ratio:16/11;background:repeating-linear-gradient(45deg,var(--bg3,#16161f),var(--bg3,#16161f) 9px,var(--bg2,#101019) 9px,var(--bg2,#101019) 18px);display:flex;align-items:center;justify-content:center;position:relative;\">\n                {{ game.artEl }}\n                <span style=\"position:absolute;top:10px;left:10px;font-family:'Silkscreen',sans-serif;font-size:7px;color:{{ game.statusColor }};border:1px solid {{ game.statusColor }};padding:4px 6px;\">{{ game.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:16px 16px 18px;\">\n                <div style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:21px;margin-bottom:7px;\">{{ game.title }}<\u002Fdiv>\n                <p style=\"font-size:11.5px;line-height:1.55;color:var(--muted,#8a8a9a);margin:0;\">{{ game.short }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- about -->\n      <div style=\"padding:56px 0;border-top:1px solid var(--line,#23232f);display:grid;grid-template-columns:1fr 1.4fr;gap:48px;align-items:start;\">\n        <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--muted,#8a8a9a);letter-spacing:0.1em;\">// 01 - ABOUT<\u002Fdiv>\n        <div>\n          <h2 style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:34px;line-height:1.05;margin:0 0 20px;\">Hey, I'm <span style=\"color:var(--purple,#c5b0f5);\">SomnaraDev<\u002Fspan>.<\u002Fh2>\n          <p style=\"font-size:14px;line-height:1.75;color:var(--muted,#8a8a9a);margin:0 0 16px;\">I've wanted to make games since I was a kid scribbling ideas in a notebook. I've worked my way through Python and GameMaker, and these days I'm happily settled in <span style=\"color:var(--fg,#e9e9f2);\">Godot<\u002Fspan> - it's been awesome. I'm based in New Zealand, and it's pretty much just me and one friend who's my loyal tester guinea pig. 🇳🇿<\u002Fp>\n          <p style=\"font-size:14px;line-height:1.75;color:var(--muted,#8a8a9a);margin:0 0 16px;\">I make story games because I love making up worlds in my head - cute vibes, fun dialogue, and characters with real personalities. It's my own little world where I can forget the real-world stuff and just build something.<\u002Fp>\n          <p style=\"font-size:14px;line-height:1.75;color:var(--muted,#8a8a9a);margin:0;\">I've got big ideas that are hard to pull off, and I'll be honest - I'm a procrastinator who tends to give up after a while. But I'm working on being better at seeing things through. Right now that means <span style=\"color:var(--fg,#e9e9f2);\">Distorted<\u002Fspan>.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- latest devlog teaser -->\n      <div style=\"padding:56px 0;border-top:1px solid var(--line,#23232f);\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;\">\n          <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--muted,#8a8a9a);letter-spacing:0.1em;\">✎ LATEST FROM THE DEVLOG<\u002Fdiv>\n          <div onclick=\"{{ goDevlog }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--purple,#c5b0f5);cursor:pointer;\">ALL POSTS →<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;\">\n          <sc-for list=\"{{ latestDevlog }}\" as=\"post\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ post.open }}\" style=\"cursor:pointer;display:grid;grid-template-columns:120px 150px 1fr;gap:20px;align-items:baseline;padding:18px 0;border-top:1px solid var(--line,#23232f);\" style-hover=\"background:var(--bg2,#101019);\">\n              <span style=\"font-size:11px;color:var(--muted,#8a8a9a);\">{{ post.date }}<\u002Fspan>\n              <span style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--purple,#c5b0f5);\">{{ post.gameTitle }}<\u002Fspan>\n              <span style=\"font-size:13px;color:var(--fg,#e9e9f2);\">{{ post.title }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- contact -->\n      <sc-if value=\"{{ showContact }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:60px 36px;margin:32px 0 64px;border:1px solid var(--line,#23232f);background:var(--bg2,#101019);text-align:center;\">\n        <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--green,#5ef38c);letter-spacing:0.12em;margin-bottom:18px;\">◆ SAY HELLO<\u002Fdiv>\n        <h2 style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:32px;margin:0 0 12px;\">Want to chat, or follow along?<\u002Fh2>\n        <p style=\"font-size:13px;line-height:1.6;color:var(--muted,#8a8a9a);margin:0 auto 26px;max-width:450px;\">I'm a solo dev in New Zealand making little story games. Drop me a line or come say hi on Insta - I'd genuinely love to hear from you.<\u002Fp>\n        <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;\">\n          <a href=\"{{ contactHref }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;text-decoration:none;color:var(--bg,#0b0b11);background:var(--purple,#c5b0f5);padding:14px 20px;border:1px solid var(--purple,#c5b0f5);\" style-hover=\"background:transparent;color:var(--purple,#c5b0f5);\">{{ contactEmailUpper }}<\u002Fa>\n          <a href=\"https://instagram.com/SomnaraDev\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;text-decoration:none;color:var(--fg,#e9e9f2);padding:14px 20px;border:1px solid var(--line,#23232f);\" style-hover=\"border-color:var(--purple,#c5b0f5);\">@SOMNARADEV<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ GAMES ============ -->\n    <sc-if value=\"{{ isGames }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:64px 0;\">\n      <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--magenta,#ff5ea8);letter-spacing:0.12em;margin-bottom:18px;\">⊞ THE GAMES<\u002Fdiv>\n      <h1 style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:56px;line-height:0.96;margin:0 0 16px;\">Four little worlds.<\u002Fh1>\n      <p style=\"font-size:14px;line-height:1.7;color:var(--muted,#8a8a9a);margin:0 0 44px;max-width:480px;\">Everything I'm building right now - click any game for the full story and its devlog.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <sc-for list=\"{{ games }}\" as=\"game\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ game.open }}\" style=\"cursor:pointer;display:grid;grid-template-columns:300px 1fr;gap:0;border:1px solid var(--line,#23232f);background:var(--bg2,#101019);\" style-hover=\"border-color:var(--purple,#c5b0f5);\">\n            <div style=\"aspect-ratio:16/10;background:repeating-linear-gradient(45deg,var(--bg3,#16161f),var(--bg3,#16161f) 10px,var(--bg2,#101019) 10px,var(--bg2,#101019) 20px);display:flex;align-items:center;justify-content:center;\">\n              {{ game.artEl }}\n            <\u002Fdiv>\n            <div style=\"padding:26px 28px;display:flex;flex-direction:column;justify-content:center;\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;\">\n                <span style=\"font-family:'Silkscreen',sans-serif;font-size:7px;color:{{ game.statusColor }};border:1px solid {{ game.statusColor }};padding:4px 6px;\">{{ game.statusLabel }}<\u002Fspan>\n                <sc-for list=\"{{ game.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                  <span style=\"font-family:'Silkscreen',sans-serif;font-size:7px;color:var(--muted,#8a8a9a);\">{{ tag }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:30px;margin-bottom:10px;\">{{ game.title }}<\u002Fdiv>\n              <p style=\"font-size:12.5px;line-height:1.65;color:var(--muted,#8a8a9a);margin:0 0 14px;max-width:520px;\">{{ game.blurb }}<\u002Fp>\n              <div style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--purple,#c5b0f5);\">OPEN →<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DEVLOG ============ -->\n    <sc-if value=\"{{ isDevlog }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:64px 0;\">\n      <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--magenta,#ff5ea8);letter-spacing:0.12em;margin-bottom:18px;\">✎ DEVLOG<\u002Fdiv>\n      <h1 style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:56px;line-height:0.96;margin:0 0 16px;\">The build log.<\u002Fh1>\n      <p style=\"font-size:14px;line-height:1.7;color:var(--muted,#8a8a9a);margin:0 0 44px;max-width:480px;\">Progress, experiments and small wins across all the games - newest first.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:0;\">\n        <sc-for list=\"{{ allDevlog }}\" as=\"post\" hint-placeholder-count=\"4\">\n          <div style=\"padding:28px 0;border-top:1px solid var(--line,#23232f);\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;\">\n              <span style=\"font-size:11px;color:var(--muted,#8a8a9a);\">{{ post.date }}<\u002Fspan>\n              <span onclick=\"{{ post.open }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--purple,#c5b0f5);cursor:pointer;\">{{ post.gameTitle }}<\u002Fspan>\n              <span style=\"font-family:'Silkscreen',sans-serif;font-size:7px;color:var(--green,#5ef38c);border:1px solid var(--line,#23232f);padding:4px 7px;\">{{ post.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:24px;margin-bottom:8px;\">{{ post.title }}<\u002Fdiv>\n            <p style=\"font-size:13.5px;line-height:1.7;color:var(--muted,#8a8a9a);margin:0;max-width:680px;\">{{ post.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ GAME DETAIL ============ -->\n    <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:40px 0 64px;\">\n      <div onclick=\"{{ goGames }}\" style=\"font-family:'Silkscreen',sans-serif;font-size:9px;color:var(--muted,#8a8a9a);cursor:pointer;margin-bottom:36px;\" style-hover=\"color:var(--purple,#c5b0f5);\">← BACK TO GAMES<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;\">\n        <span style=\"font-family:'Silkscreen',sans-serif;font-size:8px;color:{{ activeGame.statusColor }};border:1px solid {{ activeGame.statusColor }};padding:5px 8px;\">{{ activeGame.statusLabel }}<\u002Fspan>\n        <sc-for list=\"{{ activeGame.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n          <span style=\"font-family:'Silkscreen',sans-serif;font-size:8px;color:var(--muted,#8a8a9a);\">{{ tag }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h1 style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:72px;line-height:0.92;margin:0 0 18px;color:var(--purple,#c5b0f5);\">{{ activeGame.title }}<\u002Fh1>\n      <p style=\"font-size:16px;line-height:1.7;color:var(--fg,#e9e9f2);margin:0 0 40px;max-width:620px;\">{{ activeGame.blurb }}<\u002Fp>\n\n      <!-- screenshots -->\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:48px;\">\n        <sc-for list=\"{{ activeGame.shots }}\" as=\"shot\" hint-placeholder-count=\"3\">\n          <div style=\"aspect-ratio:{{ activeGame.shotRatio }};background:repeating-linear-gradient(45deg,var(--bg3,#16161f),var(--bg3,#16161f) 10px,var(--bg2,#101019) 10px,var(--bg2,#101019) 20px);border:1px solid var(--line,#23232f);display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n            {{ shot.el }}\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- cast -->\n      <sc-if value=\"{{ activeGame.hasCast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border-top:1px solid var(--line,#23232f);padding-top:44px;margin-bottom:44px;\">\n        <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--muted,#8a8a9a);letter-spacing:0.1em;margin-bottom:24px;\">♦ THE CAST<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n          <sc-for list=\"{{ activeGame.cast }}\" as=\"char\" hint-placeholder-count=\"4\">\n            <div style=\"border:1px solid var(--line,#23232f);background:var(--bg2,#101019);padding:16px;\">\n              <div style=\"aspect-ratio:1;background:repeating-linear-gradient(45deg,var(--bg3,#16161f),var(--bg3,#16161f) 8px,var(--bg2,#101019) 8px,var(--bg2,#101019) 16px);display:flex;align-items:center;justify-content:center;margin-bottom:14px;overflow:hidden;\">\n                {{ char.portraitEl }}\n              <\u002Fdiv>\n              <div style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:20px;\">{{ char.name }}<\u002Fdiv>\n              <div style=\"font-family:'Silkscreen',sans-serif;font-size:7px;color:var(--purple,#c5b0f5);margin:5px 0 10px;\">{{ char.role }}<\u002Fdiv>\n              <p style=\"font-size:11.5px;line-height:1.55;color:var(--muted,#8a8a9a);margin:0;\">{{ char.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- about + devlog -->\n      <div style=\"display:grid;grid-template-columns:1fr 1.6fr;gap:48px;align-items:start;border-top:1px solid var(--line,#23232f);padding-top:44px;\">\n        <div>\n          <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--muted,#8a8a9a);letter-spacing:0.1em;margin-bottom:18px;\">▸ ABOUT THIS GAME<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.75;color:var(--muted,#8a8a9a);margin:0 0 16px;\">{{ activeGame.about }}<\u002Fp>\n          <div style=\"font-family:'Silkscreen',sans-serif;font-size:8px;color:var(--muted,#8a8a9a);margin-top:24px;line-height:2.1;\">\n            STATUS - <span style=\"color:{{ activeGame.statusColor }};\">{{ activeGame.statusLabel }}<\u002Fspan><br>\n            GENRE - <span style=\"color:var(--fg,#e9e9f2);\">{{ activeGame.genre }}<\u002Fspan><br>\n            PLATFORM - <span style=\"color:var(--fg,#e9e9f2);\">{{ activeGame.platform }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Silkscreen',sans-serif;font-size:10px;color:var(--green,#5ef38c);letter-spacing:0.1em;margin-bottom:24px;\">✎ DEVLOG<\u002Fdiv>\n          <sc-if value=\"{{ activeGame.hasDevlog }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;\">\n              <sc-for list=\"{{ activeGame.devlog }}\" as=\"post\" hint-placeholder-count=\"2\">\n                <div style=\"padding:0 0 28px;margin-bottom:28px;border-bottom:1px solid var(--line,#23232f);\">\n                  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n                    <span style=\"font-size:11px;color:var(--muted,#8a8a9a);\">{{ post.date }}<\u002Fspan>\n                    <span style=\"font-family:'Silkscreen',sans-serif;font-size:7px;color:var(--purple,#c5b0f5);border:1px solid var(--line,#23232f);padding:4px 7px;\">{{ post.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:22px;margin-bottom:8px;\">{{ post.title }}<\u002Fdiv>\n                  <p style=\"font-size:13.5px;line-height:1.7;color:var(--muted,#8a8a9a);margin:0;\">{{ post.body }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ activeGame.noDevlog }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:32px;border:1px dashed var(--line,#23232f);text-align:center;\">\n              <p style=\"font-size:13px;line-height:1.6;color:var(--muted,#8a8a9a);margin:0;\">No entries yet - this one lives in my notebook for now. ✦<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"border-top:1px solid var(--line,#23232f);background:var(--bg2,#101019);\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:40px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-family:'Silkscreen',sans-serif;font-size:13px;color:var(--purple,#c5b0f5);margin-bottom:8px;\">SOMNARADEV<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted,#8a8a9a);margin-bottom:4px;\">Solo dev in New Zealand · made in Godot · © {{ year }}<\u002Fdiv>\n        <a href=\"{{ contactHref }}\" style=\"font-size:11px;color:var(--muted,#8a8a9a);text-decoration:none;\" style-hover=\"color:var(--purple,#c5b0f5);\">{{ contactEmail }}<\u002Fa>\n      <\u002Fdiv>\n      <a href=\"https://instagram.com/SomnaraDev\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Silkscreen',sans-serif;font-size:10px;text-decoration:none;color:var(--fg,#e9e9f2);padding:12px 18px;border:1px solid var(--line,#23232f);\" style-hover=\"border-color:var(--purple,#c5b0f5);\">FOLLOW @SOMNARADEV →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#c5b0f5&quot;, &quot;#b69cf0&quot;, &quot;#a78bdb&quot;, &quot;#cdb4ff&quot;, &quot;#d8a8f0&quot;], &quot;default&quot;: &quot;#c5b0f5&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;defaultTheme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;scanlines&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;showContact&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = { view:'home', gameId:null, theme:(props.defaultTheme || 'dark') };\n  }\n\n  themes = {\n    dark:  { '--bg':'#0b0b11','--bg2':'#101019','--bg3':'#16161f','--fg':'#e9e9f2','--muted':'#8a8a9a','--line':'#23232f','--purple':'#c5b0f5','--green':'#5ef38c','--magenta':'#ff5ea8','--scan':'rgba(255,255,255,0.025)' },\n    light: { '--bg':'#efeaf9','--bg2':'#ffffff','--bg3':'#f5f0fd','--fg':'#1a1622','--muted':'#6c6480','--line':'#e3dbf3','--purple':'#7a59d4','--green':'#1f9d5b','--magenta':'#d23a82','--scan':'rgba(90,50,140,0.035)' }\n  };\n\n  componentDidMount(){ this.applyTheme(); }\n  componentDidUpdate(){ this.applyTheme(); }\n  applyTheme(){\n    const el = this.rootRef.current;\n    if(!el) return;\n    const t = this.themes[this.state.theme] || this.themes.dark;\n    for(const k in t){ el.style.setProperty(k, t[k]); }\n    if(this.props.accentColor){ el.style.setProperty('--purple', this.props.accentColor); }\n  }\n\n  games = [\n    {\n      id:'distorted',\n      title:'Distorted',\n      tags:['STORY RPG','DECKBUILDER'],\n      statusLabel:'IN DEV',\n      statusColor:'var(--green)',\n      genre:'Story RPG · deckbuilder',\n      platform:'Windows · in development',\n      short:'A boy who sees spirits, and two towns that need him.',\n      artLabel:'distorted - key art',\n      art:'assets/distorted-cover.png',\n      blurb:\"Max has been able to see spirits since he was a kid - and nobody believes him except his two best friends. On the last day of school, he's pulled into the Distorted realm, where the spirits of a town called Stillhaven need his help. Part story-driven RPG, part Slay-the-Spire-style deckbuilder.\",\n      about:\"Distorted is my main focus right now. You play as Max, crossing between his hometown of Willowshade and its spirit-world reflection, Stillhaven - meeting lost spirits, helping them find their place, and slowly piecing together what's threatening the town. Between stories, the fights play out as a tactical, card-based deckbuilder. Built in Godot for Windows, slowly but lovingly.\",\n      shots:['drop screenshot','drop screenshot','drop screenshot'],\n      cast:[\n        { name:'Max', portrait:'assets/char-max.png', role:'The one who sees', desc:\"17, has sensed spirits since he was small. Quiet, kind and pure-hearted - he just wants to help where he can.\" },\n        { name:'Lia', portrait:'assets/char-lia.png', role:'Childhood friend', desc:\"Grew up alongside Max and loves him like a brother. Kind most of the time, stern when it counts, and merciless at teasing Marty.\" },\n        { name:'Marty', portrait:'assets/char-marty.png', role:'The loud one', desc:\"Met Max in high school. Acts tough but isn't, bickers with Lia (they're friends really), and ends half his sentences with \\u201cYo!\\u201d\" },\n        { name:'Kira', portrait:'assets/char-kira.png', role:'Spirit guardian', desc:\"A pure, protective soul who watches over Stillhaven and loves its residents more than anything. She chose Max long ago.\" }\n      ],\n      devlog:[\n        { date:'2026.06.15', tag:'PROGRESS', title:'Stillhaven is waking up', body:\"Got my Stillhaven spirits working and started structuring a questline for each one. There's about 30 minutes of gameplay playable end-to-end now - and I'm making it pretty as I go. The demo is still a good few months out, but it's really starting to come together.\" },\n        { date:'2026.05.28', tag:'WORLD', title:'Two towns, one loop', body:\"Building out the core rhythm of crossing between Stillhaven and Willowshade - meet a spirit, track down their unfinished business over in the living town, then carry a little peace back to them. It's exactly the cosy-but-meaningful feeling I've been chasing.\" }\n      ]\n    },\n    {\n      id:'soul',\n      title:'Soul',\n      tags:['IDLE','INCREMENTAL'],\n      statusLabel:'LAUNCHING SOON',\n      statusColor:'var(--green)',\n      genre:'Idle incremental',\n      platform:'Android · Google Play',\n      short:'A spooky idle clicker - and my first mobile game.',\n      artLabel:'soul - key art',\n      art:'assets/soul-banner.png',\n      blurb:\"An idle incremental clicker with a spooky spin. Upgrade, collect awards, ascend to reset stronger, and travel between mortal, heavenly and hellish realms - all wrapped in deliberately scruffy doodle-art that clashes with its clean modern UI.\",\n      about:\"Soul started as my 'just ship something' project - a way to learn mobile development end to end, so think of it as the guinea-pig game. It's a complete-feeling idle clicker: tap, upgrade, earn awards, prestige, and unlock new realms. The intentionally bad art against a polished UI is the whole joke. It's basically done - just waiting on Google Play Console so I can launch on Android.\",\n      shotRatio:'934 / 1622',\n      shots:[{ src:'assets/soul-40.png' },{ src:'assets/soul-24.png' },{ src:'assets/soul-12.png' }],\n      devlog:[\n        { date:'2026.06.12', tag:'RELEASE', title:'Final touches before launch', body:\"Doing the last bug fixes and polish. Now I'm just waiting on Google Play Console to verify the app - once that clears I'll start closed testing, then hopefully release shortly after. My very first mobile game, eep!\" }\n      ]\n    },\n    {\n      id:'devils-dice',\n      title:\"Devil's Dice\",\n      tags:['ROGUELITE','DICE'],\n      statusLabel:'ON HOLD',\n      statusColor:'var(--magenta)',\n      genre:'Roguelite die-builder',\n      platform:'Windows · release TBC',\n      short:'Roll, hold, connect. A roguelite die-builder.',\n      artLabel:\"devil's dice - key art\",\n      placeholder:'q',\n      blurb:\"A roguelite die-builder. You get three rolls and five rerolls a round on a 3×5 grid - hold the dice you want, hope they connect, and beat the target score. Then spend your winnings on a growing arsenal of 40+ wild, synergising dice.\",\n      about:\"Devil's Dice is a push-your-luck roguelite built on a 3×5 grid of dice. Hold the dice you like between rolls, chase a target score, and survive a debuff-laden boss every fourth round. Between rounds you shop for new dice and choose exactly where they sit, because position is everything - some only work next to the right neighbours (like Kevin and Ally, who do nothing alone but smile and score when they face each other). There are 40+ so far, from a plain +50 to the Pawn Die that evolves into a Bishop then a Queen. I stepped away last year before burning out, but I'll be back with fresh eyes.\",\n      shots:['?','?','?'],\n      devlog:[\n        { date:'2025.09.20', tag:'NOTE', title:'Paused, not forgotten', body:\"I got the demo close to done last year before I ran out of steam. Putting it down for a bit so I can come back with fresh eyes - the roll-hold-connect core is way too fun to abandon for good.\" }\n      ]\n    },\n    {\n      id:'somnara',\n      title:'Somnara',\n      tags:['STORY','ADVENTURE'],\n      statusLabel:'SOMEDAY',\n      statusColor:'var(--purple)',\n      genre:'Story-driven adventure',\n      platform:'TBA',\n      short:\"The story I've wanted to tell forever.\",\n      artLabel:'somnara - concept art',\n      placeholder:'q',\n      blurb:\"Lia is swept away in a storm and washes up somewhere strange, among unusual residents - visually and personally - who each help her find her way home. A quiet, personal story about death, acceptance, friendship and love.\",\n      about:\"Somnara is the game I've wanted to make since I was a kid - a story that keeps evolving as I do. A few things never change: Lia, the storm, the strange place she wakes in, and the unusual people she meets who each carry her a little further along. It's deeply personal, and I've built many prototypes without ever seeing it through. One day I will. Until then, it stays safe in my notebook.\",\n      shots:['?','?','?'],\n      cast:[],\n      devlog:[]\n    }\n  ];\n\n  go(view){ this.setState({ view, gameId:null }); window.scrollTo(0,0); }\n  openGame(id){ this.setState({ view:'detail', gameId:id }); window.scrollTo(0,0); }\n  toggleTheme(){ this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })); }\n\n  renderVals(){\n    const v = this.state.view;\n    const qStyle = { fontFamily:\"'Pixelify Sans', sans-serif\", fontWeight:700, fontSize:'72px', color:'var(--muted, #8a8a9a)', lineHeight:1 };\n    const gamesV = this.games.map(g => ({\n      ...g,\n      open: () => this.openGame(g.id),\n      hasDevlog: g.devlog.length > 0,\n      noDevlog: g.devlog.length === 0,\n      hasCast: !!(g.cast && g.cast.length),\n      shotRatio: g.shotRatio || '16 / 10',\n      artEl: g.art\n        ? React.createElement('img', { src: g.art, alt: g.title + ' art', style: { width:'100%', height:'100%', objectFit:'cover', display:'block' } })\n        : (g.placeholder === 'q'\n            ? React.createElement('span', { style: qStyle }, '?')\n            : React.createElement('span', { style: { fontSize:'11px', color:'var(--muted, #8a8a9a)' } }, g.artLabel)),\n      cast: (g.cast || []).map(c => ({\n        ...c,\n        portraitEl: c.portrait\n          ? React.createElement('img', { src: c.portrait, alt: c.name, style: { width:'100%', height:'100%', objectFit:'contain', display:'block', imageRendering:'pixelated' } })\n          : React.createElement('span', { style: { fontSize:'9px', color:'var(--muted, #8a8a9a)' } }, 'portrait')\n      })),\n      shots: (g.shots || []).map(s => {\n        if (typeof s !== 'string' && s && s.src) {\n          return { el: React.createElement('img', { src: s.src, alt: 'screenshot', style: { width:'100%', height:'100%', objectFit:'contain', display:'block' } }) };\n        }\n        const label = (typeof s === 'string') ? s : ((s && s.label) || '');\n        if (label === '?') return { el: React.createElement('span', { style: qStyle }, '?') };\n        return { el: React.createElement('span', { style: { fontSize:'10px', color:'var(--muted, #8a8a9a)' } }, label) };\n      })\n    }));\n    const byId = {};\n    gamesV.forEach(g => { byId[g.id] = g; });\n    const activeGame = byId[this.state.gameId] || gamesV[0];\n\n    const allDevlog = gamesV\n      .flatMap(g => g.devlog.map(d => ({ ...d, gameId:g.id, gameTitle:g.title, open:() => this.openGame(g.id) })))\n      .sort((a,b) => a.date < b.date ? 1 : -1);\n\n    const cEmail = 'SomnaraDev' + '@' + 'gmail.com';\n\n    return {\n      contactEmail: cEmail,\n      contactEmailUpper: cEmail.toUpperCase(),\n      contactHref: 'mailto:' + cEmail,\n      rootRef: this.rootRef,\n      isHome: v === 'home',\n      isGames: v === 'games',\n      isDevlog: v === 'devlog',\n      isDetail: v === 'detail',\n      navHome:   v === 'home'   ? 'var(--purple)' : 'var(--muted)',\n      navGames:  v === 'games'  ? 'var(--purple)' : 'var(--muted)',\n      navDevlog: v === 'devlog' ? 'var(--purple)' : 'var(--muted)',\n      games: gamesV,\n      featured: gamesV[0],\n      others: gamesV.slice(1),\n      activeGame,\n      allDevlog,\n      latestDevlog: allDevlog.slice(0,3),\n      theme: this.state.theme,\n      themeLabel: this.state.theme === 'dark' ? 'LIGHT' : 'DARK',\n      goHome:   () => this.go('home'),\n      goGames:  () => this.go('games'),\n      goDevlog: () => this.go('devlog'),\n      toggleTheme: () => this.toggleTheme(),\n      scanlines: this.props.scanlines !== false,\n      showContact: this.props.showContact !== false,\n      year: 2026\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
